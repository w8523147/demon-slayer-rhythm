<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日輪之律 - 鬼滅之刃主題遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');

        :root {
            --water-blue: #00b4d8;
            --fire-red: #e63946;
            --thunder-yellow: #ffb703;
            --wood-dark: #1a120b;
        }

        body {
            background-color: #0c0c0c;
            color: #f1f1f1;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            margin: 0;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            background-image: 
                linear-gradient(45deg, #111 25%, transparent 25%), 
                linear-gradient(-45deg, #111 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #111 75%), 
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 80px 80px;
        }

        /* 遊戲軌道外殼 */
        .lane-container {
            display: flex;
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.95);
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 全集中特效 - 水/火 */
        .total-concentration { box-shadow: inset 0 0 60px var(--water-blue), 0 0 30px var(--water-blue); }
        .total-concentration-fire { box-shadow: inset 0 0 60px var(--fire-red), 0 0 30px var(--fire-red); }

        .lane {
            flex: 1;
            position: relative;
            border-right: 1px dashed rgba(255,255,255,0.05);
        }

        /* 敲擊按鈕樣式 */
        .hit-button {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(26, 18, 11, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: rgba(255,255,255,0.3);
            z-index: 50;
            transition: all 0.1s;
        }

        .lane-active .hit-button {
            transform: translateX(-50%) scale(0.9);
            background: var(--water-blue);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 40px var(--water-blue);
        }

        /* 斬擊效果 */
        .slash-effect {
            position: absolute;
            bottom: 15vh;
            left: -20%;
            width: 140%;
            height: 4px;
            background: #fff;
            box-shadow: 0 0 20px #fff, 0 0 40px var(--water-blue);
            transform: scaleX(0);
            opacity: 0;
            z-index: 45;
            pointer-events: none;
        }
        .lane-active .slash-effect { animation: slash 0.15s ease-out forwards; }
        @keyframes slash {
            0% { transform: scaleX(0); opacity: 1; }
            100% { transform: scaleX(1); opacity: 0; }
        }

        /* 音符樣式 */
        .note {
            position: absolute;
            width: 90%;
            left: 5%;
            height: 20px;
            border-radius: 4px;
            z-index: 40;
            will-change: transform;
        }

        .hit-zone-bar {
            position: absolute;
            bottom: 15vh;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 35;
        }

        .glass-ui {
            background: rgba(26, 18, 11, 0.95);
            border: 1px solid #c0a080;
            backdrop-filter: blur(10px);
        }

        .judgement-text {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .start-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- 頂部進度條 -->
    <div id="progress-bar" class="fixed top-0 left-0 h-1 bg-amber-500 z-[100] transition-all duration-300" style="width: 0%"></div>

    <div id="game-container" class="relative w-full h-screen overflow-hidden">
        <!-- 分數 UI -->
        <div class="absolute top-4 left-4 glass-ui p-4 rounded shadow-2xl z-50">
            <div class="text-[10px] text-amber-500 tracking-[0.2em] font-bold">BREATHING SCORE</div>
            <div id="score-display" class="text-4xl font-black text-white italic">000000</div>
            <div class="flex items-center gap-2 mt-1">
                <span class="text-xs font-bold text-sky-400">COMBO: <span id="combo-display">0</span></span>
                <span id="diff-tag" class="text-[10px] bg-amber-900/50 px-2 py-0.5 rounded border border-amber-700">癸</span>
            </div>
        </div>

        <!-- 遊戲軌道 -->
        <div class="lane-container" id="main-track">
            <div class="lane" data-idx="0"><div class="hit-button">S</div><div class="slash-effect"></div></div>
            <div class="lane" data-idx="1"><div class="hit-button">D</div><div class="slash-effect"></div></div>
            <div class="lane" data-idx="2"><div class="hit-button">K</div><div class="slash-effect"></div></div>
            <div class="lane" data-idx="3"><div class="hit-button">L</div><div class="slash-effect"></div></div>
            <div class="hit-zone-bar"></div>
        </div>

        <!-- 判定文字 -->
        <div id="judgement" class="judgement-text opacity-0">PERFECT</div>

        <!-- 開始畫面 -->
        <div id="start-screen" class="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black/90 p-8 text-center">
            <div class="mb-12">
                <h2 class="text-amber-600 text-sm tracking-[0.6em] mb-2">DEMON SLAYER RHYTHM</h2>
                <h1 class="text-6xl font-black text-white italic border-b-8 border-amber-800 pb-4">日輪之律</h1>
            </div>

            <div class="glass-ui p-8 rounded-xl w-full max-w-md shadow-2xl">
                <div class="mb-6">
                    <p class="text-amber-100/60 text-xs mb-2">選擇呼吸難度</p>
                    <div class="flex justify-center gap-3">
                        <button class="diff-btn active" onclick="setDiff('easy', this)">癸 (水)</button>
                        <button class="diff-btn" onclick="setDiff('normal', this)">乙 (雷)</button>
                        <button class="diff-btn" onclick="setDiff('hard', this)">柱 (炎)</button>
                    </div>
                </div>

                <button id="start-btn" disabled class="w-full bg-slate-800 text-slate-500 font-black py-5 rounded-lg text-xl transition-all shadow-lg border-b-4 border-slate-900">
                    鎹鴉召喚音律中...
                </button>
                <p id="audio-info" class="text-amber-700 text-[10px] mt-4 font-bold uppercase tracking-widest">Connecting to GitHub Repository...</p>
            </div>
            
            <button id="bypass-btn" class="mt-8 text-xs text-slate-500 underline opacity-50 hover:opacity-100">
                如果長時間未載入，點此強制啟動 (無音樂模式)
            </button>
        </div>

        <!-- 音訊元件 -->
        <audio id="bgm-player" crossorigin="anonymous"></audio>
    </div>

    <script>
        /**
         * 【大師教學專區】
         * 1. 將下面的 AUDIO_URL 替換成你在 GitHub 的 Raw 連結。
         * 2. 瀏覽器必須要有使用者互動才能播放音樂。
         */
        const AUDIO_URL = "https://github.com/w8523147/demon-slayer-rhythm/raw/refs/heads/main/bgm.mp3"; 

        const CONFIG = {
            easy: { speed: 4.5, mult: 1.0, label: '癸', color: '#00b4d8' },
            normal: { speed: 7.5, mult: 2.0, label: '乙', color: '#ffb703' },
            hard: { speed: 11.0, mult: 4.0, label: '柱', color: '#e63946' }
        };

        let currentLevel = 'easy';
        let isPlaying = false;
        let score = 0, combo = 0, maxCombo = 0;
        let audioCtx, track;

        // 生成隨機譜面 (示範用)
        const generateChart = () => {
            const chart = [];
            for(let i=1; i<100; i++) {
                chart.push({ time: i * (1200 - (Math.random() * 200)), lane: Math.floor(Math.random() * 4) });
            }
            return chart;
        };

        let gameChart = generateChart();
        const lanes = Array.from(document.querySelectorAll('.lane'));
        const bgm = document.getElementById('bgm-player');
        const startBtn = document.getElementById('start-btn');
        const audioInfo = document.getElementById('audio-info');

        // 初始化 Web Audio API
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                track = audioCtx.createMediaElementSource(bgm);
                track.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 模擬鋼琴音 (點擊反饋)
        function playHitSound(idx) {
            if (!audioCtx) return;
            const freqs = [261.6, 329.6, 392.0, 523.3];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freqs[idx], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 載入音訊
        const loadMusic = () => {
            bgm.src = AUDIO_URL;
            bgm.load();
            
            bgm.oncanplaythrough = () => {
                startBtn.disabled = false;
                startBtn.classList.replace('bg-slate-800', 'bg-amber-600');
                startBtn.classList.replace('text-slate-500', 'text-white');
                startBtn.classList.add('start-anim');
                startBtn.innerText = "全集中・開始挑戰";
                audioInfo.innerText = "GITHUB 音律同步成功";
            };

            bgm.onerror = () => {
                audioInfo.innerText = "GITHUB 連接失敗，請檢查 URL";
                startBtn.disabled = false;
                startBtn.innerText = "無音樂模式啟動";
            };
        };

        window.setDiff = (level, btn) => {
            currentLevel = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('diff-tag').innerText = CONFIG[level].label;
            document.documentElement.style.setProperty('--water-blue', CONFIG[level].color);
        };

        function startGame(withMusic = true) {
            initAudio();
            document.getElementById('start-screen').style.display = 'none';
            isPlaying = true;
            
            if (withMusic) bgm.play();
            
            const startTimestamp = performance.now();
            
            function frame(now) {
                if (!isPlaying) return;
                const elapsed = now - startTimestamp;
                
                // 更新進度
                if (bgm.duration) document.getElementById('progress-bar').style.width = `${(bgm.currentTime/bgm.duration)*100}%`;

                const speed = CONFIG[currentLevel].speed;
                const hitZone = window.innerHeight * 0.85;

                // 生成音符
                gameChart.forEach(n => {
                    if (!n.active && elapsed >= n.time - (hitZone / speed * 16.6)) {
                        const div = document.createElement('div');
                        div.className = 'note';
                        div.style.background = `linear-gradient(to right, #fff, ${CONFIG[currentLevel].color})`;
                        div.style.boxShadow = `0 0 15px ${CONFIG[currentLevel].color}`;
                        lanes[n.lane].appendChild(div);
                        n.element = div; n.active = true;
                    }
                });

                // 移動音符
                document.querySelectorAll('.note').forEach(n => {
                    let y = parseFloat(n.getAttribute('data-y')) || 0;
                    y += speed;
                    n.style.transform = `translateY(${y}px)`;
                    n.setAttribute('data-y', y);
                    if (y > window.innerHeight) { n.remove(); combo = 0; updateUI(); }
                });

                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        function handleTap(idx) {
            if (!isPlaying) return;
            initAudio();
            const lane = lanes[idx];
            lane.classList.add('lane-active');
            setTimeout(() => lane.classList.remove('lane-active'), 100);
            playHitSound(idx);

            const notes = lane.querySelectorAll('.note');
            let hit = false;
            notes.forEach(n => {
                const y = parseFloat(n.getAttribute('data-y'));
                const dist = Math.abs(y - (window.innerHeight * 0.85 - 10));
                if (dist < 80 && !hit) {
                    const perf = dist < 40;
                    showJudgement(perf ? "PERFECT" : "GREAT", perf ? CONFIG[currentLevel].color : "#fff");
                    score += (perf ? 100 : 60) * CONFIG[currentLevel].mult;
                    combo++;
                    n.remove(); hit = true;
                }
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(score).toString().padStart(6, '0');
            document.getElementById('combo-display').innerText = combo;
        }

        function showJudgement(txt, col) {
            const el = document.getElementById('judgement');
            el.innerText = txt; el.style.color = col; el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 300);
        }

        // 事件監聽
        lanes.forEach((l, i) => {
            l.addEventListener('mousedown', () => handleTap(i));
            l.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(i); });
        });

        startBtn.onclick = () => startGame(true);
        document.getElementById('bypass-btn').onclick = () => startGame(false);

        window.onkeydown = (e) => {
            const keys = { 's':0, 'd':1, 'k':2, 'l':3 };
            if (keys[e.key.toLowerCase()] !== undefined) handleTap(keys[e.key.toLowerCase()]);
        };

        window.onload = loadMusic;
    </script>
</body>
</html>
