<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日輪之律 - 掃描線模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');
        
        :root { 
            --water-blue: #00b4d8; 
            --fire-red: #e63946; 
            --thunder-yellow: #ffb703; 
            --note-size: 80px;
        }
        
        body {
            background-color: #050505; color: #f1f1f1; font-family: 'Noto Serif TC', serif;
            overflow: hidden; margin: 0; touch-action: none; user-select: none;
            background-image: 
                radial-gradient(circle at center, #1a1a1a 0%, #000 100%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        #play-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }

        .cytus-note {
            position: absolute; width: var(--note-size); height: var(--note-size);
            transform: translate(-50%, -50%); border-radius: 50%; z-index: 40; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            animation: pop-in 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes pop-in { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .note-inner { width: 40%; height: 40%; border-radius: 50%; background: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.8); z-index: 2; pointer-events: none; }
        .note-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--water-blue); box-sizing: border-box; opacity: 0.8; pointer-events: none; transform: scale(2.5); transition: transform linear;
        }

        .note-hit-effect {
            position: absolute; width: var(--note-size); height: var(--note-size); transform: translate(-50%, -50%); border-radius: 50%; background: var(--water-blue); z-index: 39; pointer-events: none; animation: hit-blast 0.4s ease-out forwards;
        }
        @keyframes hit-blast { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }

        .local-judgement {
            position: absolute; transform: translate(-50%, -100%); font-size: 1.5rem; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 100; pointer-events: none; animation: float-up 0.5s ease-out forwards;
        }
        @keyframes float-up { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); } 50% { transform: translate(-50%, -100%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(1); } }

        .glass-ui { background: rgba(10, 10, 10, 0.85); border: 1px solid #444; backdrop-filter: blur(10px); }
        .diff-btn { border: 1px solid #c0a080; padding: 6px 10px; font-size: 0.7rem; color: #c0a080; border-radius: 4px; transition: 0.3s; }
        .diff-btn.active { background: #c0a080; color: #1a120b; font-weight: 900; }
        .start-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="play-area"></div>

    <!-- UI 面板 -->
    <div class="absolute top-4 left-4 glass-ui p-4 rounded shadow-2xl z-50 pointer-events-none">
        <div class="flex items-center gap-3">
            <div>
                <div class="text-[10px] text-amber-500 tracking-[0.2em] font-bold">SCORE</div>
                <div id="score-display" class="text-3xl font-black text-white italic">000000</div>
            </div>
            <div class="border-l border-gray-600 pl-3">
                <div class="text-[10px] text-sky-400 tracking-[0.2em] font-bold">COMBO</div>
                <div id="combo-display" class="text-3xl font-black text-white">0</div>
            </div>
        </div>
    </div>

    <!-- 暫停按鈕 -->
    <div id="pause-btn-container" class="absolute top-4 right-4 z-50 hidden">
        <button onclick="togglePause()" class="glass-ui px-5 py-3 text-white font-black text-sm rounded shadow-lg tracking-widest hover:bg-white/10 transition">
            || PAUSE
        </button>
    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black/95 p-8 text-center">
        <h2 class="text-amber-600 text-sm tracking-[0.8em] mb-2">REACTION STYLE RHYTHM</h2>
        <h1 class="text-6xl font-black text-white italic border-b-4 border-amber-800 pb-2 mb-8">日輪之律</h1>

        <div class="glass-ui p-6 rounded-xl w-full max-w-sm shadow-2xl">
            <div class="mb-4 text-left">
                <p class="text-amber-100/60 text-[10px] mb-1 uppercase tracking-widest">Select Song</p>
                <select id="song-select" class="bg-black/50 border border-amber-900 text-white text-sm p-3 w-full rounded outline-none focus:border-amber-500"></select>
            </div>

            <div class="mb-6 text-left">
                <p class="text-amber-100/60 text-[10px] mb-1 uppercase tracking-widest">Difficulty & Speed</p>
                <div class="flex justify-between gap-2">
                    <button class="diff-btn active flex-1" onclick="setDiff('easy', this)">癸 (慢速)</button>
                    <button class="diff-btn flex-1" onclick="setDiff('normal', this)">乙 (原速)</button>
                    <button class="diff-btn flex-1" onclick="setDiff('hard', this)">柱 (加速)</button>
                </div>
            </div>

            <button id="start-btn" disabled class="w-full bg-slate-800 text-slate-500 font-black py-4 rounded-lg text-lg transition-all border-b-4 border-slate-900 hover:scale-105 active:scale-95">
                連接音律網路中...
            </button>
            <p id="audio-info" class="text-amber-700 text-[9px] mt-4 font-bold tracking-tighter">WAITING...</p>
        </div>
    </div>

    <!-- 暫停選單 -->
    <div id="pause-screen" class="absolute inset-0 z-[250] flex flex-col items-center justify-center bg-black/90 p-8 text-center hidden backdrop-blur-sm">
        <h1 class="text-5xl font-black text-white italic mb-10 tracking-[0.2em]">PAUSED</h1>
        <button onclick="togglePause()" class="w-64 mb-4 bg-amber-600 text-white font-black py-4 rounded-lg text-xl hover:bg-amber-500 transition-colors shadow-[0_0_20px_rgba(217,119,6,0.5)]">繼續遊戲</button>
        <button onclick="endGame(true)" class="w-64 bg-slate-800 text-slate-400 font-black py-4 rounded-lg text-lg hover:bg-slate-700 transition-colors">放棄任務</button>
    </div>

    <audio id="bgm-player"></audio>

    <script>
        // --- 1. 曲目與設定 ---
        // 【大師優化】：既然已經部署到 GitHub Pages，直接使用「相對路徑」是最快且保證不會有 CORS 阻擋的方法！
        const SONGS = {
            gurenge: {
                title: "紅蓮華",
                url: "bgm.mp3",  // 直接讀取同資料夾下的 bgm.mp3
                bpm: 135,
                offset: 2200 
            },
            bibi: {
                title: "小雞嗶嗶",
                url: "BiBi.mp3", // 直接讀取同資料夾下的 BiBi.mp3
                bpm: 130,
                offset: 1000 
            }
        };

        const CONFIG = {
            easy: { color: '#00b4d8', speedRate: 0.8 },    // 慢速 0.8 倍
            normal: { color: '#ffb703', speedRate: 1.0 },  // 正常速度
            hard: { color: '#e63946', speedRate: 1.3 }     // 加速 1.3 倍
        };

        const PRE_SPAWN_BEATS = 1; 

        let currentSongKey = "gurenge";
        let currentLevel = 'easy';
        let isPlaying = false;
        let isPaused = false; 
        let score = 0, combo = 0, maxCombo = 0;
        let audioCtx;
        let gameChart = [];
        let leadTime = 0;

        const playArea = document.getElementById('play-area');
        const bgm = document.getElementById('bgm-player');
        const startBtn = document.getElementById('start-btn');
        const audioInfo = document.getElementById('audio-info');

        // --- 2. 初始化選單 ---
        const initUI = () => {
            const select = document.getElementById('song-select');
            select.innerHTML = Object.keys(SONGS).map(k => `<option value="${k}">${SONGS[k].title}</option>`).join('');
            select.onchange = (e) => { currentSongKey = e.target.value; loadMusic(); };
        };

        const loadMusic = () => {
            startBtn.disabled = true;
            startBtn.innerText = "讀取音源中...";
            startBtn.classList.replace('bg-amber-600', 'bg-slate-800');
            startBtn.classList.replace('bg-red-800', 'bg-slate-800'); 
            startBtn.classList.remove('start-anim');
            
            // 使用相對路徑直接讀取，加上隨機數避免 GitHub Pages 強制快取舊檔
            bgm.src = SONGS[currentSongKey].url + "?t=" + new Date().getTime(); 
            bgm.load();
            
            bgm.oncanplaythrough = () => {
                startBtn.disabled = false;
                startBtn.classList.replace('bg-slate-800', 'bg-amber-600');
                startBtn.classList.replace('text-slate-500', 'text-white');
                startBtn.classList.add('start-anim');
                startBtn.innerText = "LINK START";
                audioInfo.innerText = "READY TO PLAY / 音源就緒";
            };

            bgm.onerror = () => {
                startBtn.disabled = true;
                startBtn.classList.replace('bg-slate-800', 'bg-red-800');
                startBtn.innerText = "讀取失敗";
                audioInfo.innerText = `❌ 找不到檔案：${SONGS[currentSongKey].url}。請確認檔名大小寫！`;
            };
        };

        function setDiff(level, btn) {
            currentLevel = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.documentElement.style.setProperty('--water-blue', CONFIG[level].color);
        }

        // --- 3. 暫停功能邏輯 ---
        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            const pauseScreen = document.getElementById('pause-screen');
            
            if (isPaused) {
                bgm.pause();
                pauseScreen.classList.remove('hidden');
            } else {
                bgm.play();
                pauseScreen.classList.add('hidden');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && isPlaying) togglePause();
        });

        // --- 4. 譜面引擎 ---
        const generateHitChart = (duration) => {
            const chart = [];
            const song = SONGS[currentSongKey];
            const beatInterval = (60 / song.bpm) * 1000;
            leadTime = beatInterval * PRE_SPAWN_BEATS;
            
            for (let t = song.offset; t < (duration * 1000) - 3000; t += beatInterval) {
                let posX, posY;
                do {
                    posX = 15 + Math.random() * 70;
                    posY = 15 + Math.random() * 70;
                } while (posX < 45 && Math.abs(posY) < 25);

                chart.push({ time: t, x: posX, y: posY, spawned: false, hit: false, element: null });

                if(Math.random() > 0.85) {
                    let t2 = t + (beatInterval / 2);
                    let posX2, posY2;
                    do {
                        posX2 = 15 + Math.random() * 70;
                        posY2 = 15 + Math.random() * 70;
                    } while ((posX2 < 45 && posY2 < 25) || (Math.abs(posX2 - posX) < 20 && Math.abs(posY2 - posY) < 20));
                    
                    chart.push({ time: t2, x: posX2, y: posY2, spawned: false, hit: false, element: null });
                }
            }
            chart.sort((a, b) => a.time - b.time);
            return chart;
        };

        // --- 5. 遊戲主循環 ---
        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('pause-btn-container').classList.remove('hidden');
            document.querySelectorAll('.cytus-note').forEach(e => e.remove());
            
            score = 0; combo = 0; isPaused = false; updateUI();
            gameChart = generateHitChart(bgm.duration || 180);
            isPlaying = true;

            bgm.playbackRate = CONFIG[currentLevel].speedRate;
            bgm.preservesPitch = true;
            bgm.play();

            function frame() {
                if (!isPlaying) return;

                if (isPaused) {
                    requestAnimationFrame(frame);
                    return;
                }

                const currentTime = bgm.currentTime * 1000;

                gameChart.forEach(note => {
                    const spawnTime = note.time - leadTime;

                    if (!note.spawned && currentTime >= spawnTime && currentTime < note.time) {
                        spawnNote(note);
                    }

                    if (note.spawned && !note.hit && note.element) {
                        const ring = note.element.querySelector('.note-ring');
                        if(ring) {
                            let timeLeft = note.time - currentTime;
                            let ringScale = 1.0 + (timeLeft / leadTime) * 1.5;
                            ringScale = Math.max(1.0, Math.min(2.5, ringScale));
                            ring.style.transform = `scale(${ringScale})`;
                        }
                    }

                    if (note.spawned && !note.hit && currentTime > note.time + 200) {
                        note.hit = true;
                        combo = 0; 
                        updateUI();
                        showJudgement(note.x, note.y, "MISS", "#ff4444");
                        if(note.element) {
                            note.element.style.opacity = '0.3';
                            note.element.style.transform = `translate(-50%, -50%) scale(0.8)`;
                            setTimeout(() => note.element.remove(), 200);
                        }
                    }
                });

                if (bgm.ended) endGame();
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        // --- 6. 繪製與互動 ---
        function spawnNote(noteData) {
            const div = document.createElement('div');
            div.className = 'cytus-note';
            div.style.left = `${noteData.x}%`;
            div.style.top = `${noteData.y}%`;
            
            div.innerHTML = `
                <div class="note-ring" style="border-color: ${CONFIG[currentLevel].color}"></div>
                <div class="note-inner"></div>
            `;
            
            playArea.appendChild(div);
            noteData.element = div;
            noteData.spawned = true;

            div.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                handleHit(noteData);
            });
        }

        function handleHit(noteData) {
            if (!isPlaying || isPaused || noteData.hit) return;
            initAudio(); 

            const currentTime = bgm.currentTime * 1000;
            const diff = Math.abs(currentTime - noteData.time);

            if (diff > 250) {
                noteData.hit = true;
                combo = 0; updateUI();
                showJudgement(noteData.x, noteData.y, "MISS", "#ff4444");
                noteData.element.style.opacity = '0.3';
                noteData.element.style.transform = `translate(-50%, -50%) scale(0.8)`;
                setTimeout(() => noteData.element.remove(), 200);
                return;
            }

            noteData.hit = true;
            let rating = ""; let points = 0; let color = "";

            if (diff <= 60) { 
                rating = "PERFECT"; points = 100; color = CONFIG[currentLevel].color;
            } else if (diff <= 130) { 
                rating = "GREAT"; points = 50; color = "#ffffff";
            } else { 
                rating = "GOOD"; points = 30; color = "#aaaaaa";
            }

            score += points; combo++; if (combo > maxCombo) maxCombo = combo;
            updateUI();
            showJudgement(noteData.x, noteData.y, rating, color);
            createHitEffect(noteData.x, noteData.y, color);
            noteData.element.remove();
        }

        function createHitEffect(x, y, color) {
            const effect = document.createElement('div');
            effect.className = 'note-hit-effect';
            effect.style.left = `${x}%`;
            effect.style.top = `${y}%`;
            effect.style.background = color;
            playArea.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }

        function showJudgement(x, y, txt, col) {
            const el = document.createElement('div');
            el.className = 'local-judgement';
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;
            el.style.color = col;
            el.innerText = txt;
            playArea.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(score).toString().padStart(6, '0');
            document.getElementById('combo-display').innerText = combo;
        }

        function endGame(forced = false) {
            isPlaying = false;
            document.getElementById('pause-btn-container').classList.add('hidden');
            
            if (forced) {
                alert(`任務中斷！返回主選單。`);
            } else {
                alert(`任務達成！\n總分：${score}\n最高連擊：${maxCombo}`);
            }
            location.reload();
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        startBtn.onclick = startGame;
        initUI();
        loadMusic();

    </script>
</body>
</html>
