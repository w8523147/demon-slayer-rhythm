<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日輪之律 - 掃描線模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');
        
        :root { 
            --water-blue: #00b4d8; 
            --fire-red: #e63946; 
            --thunder-yellow: #ffb703; 
            --note-size: 80px;
        }
        
        body {
            background-color: #050505; color: #f1f1f1; font-family: 'Noto Serif TC', serif;
            overflow: hidden; margin: 0; touch-action: none; user-select: none;
            /* 背景加入稍微科幻與和風混合的網格 */
            background-image: 
                radial-gradient(circle at center, #1a1a1a 0%, #000 100%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* 遊戲區域 */
        #play-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        /* 掃描線 */
        #scanline {
            position: absolute;
            left: 0; right: 0; height: 3px;
            background: #fff;
            box-shadow: 0 0 20px 5px var(--water-blue), 0 0 40px var(--water-blue);
            z-index: 50;
            pointer-events: none;
            will-change: top;
        }

        /* Cytus 風格音符 */
        .cytus-note {
            position: absolute;
            width: var(--note-size);
            height: var(--note-size);
            transform: translate(-50%, -50%); /* 中心點對齊座標 */
            border-radius: 50%;
            z-index: 40;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 出現時的縮放動畫 */
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop-in {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 音符內部實體 */
        .note-inner {
            width: 40%; height: 40%;
            border-radius: 50%;
            background: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.8);
            z-index: 2;
            pointer-events: none;
        }

        /* 音符外部光圈 (時間指示器) */
        .note-ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--water-blue);
            box-sizing: border-box;
            opacity: 0.8;
            pointer-events: none;
            /* 光圈會從大縮小到音符邊緣，透過 JS 控制動畫 */
            transform: scale(1.8);
            transition: transform linear;
        }

        /* 擊中時的特效 */
        .note-hit-effect {
            position: absolute;
            width: var(--note-size); height: var(--note-size);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: var(--water-blue);
            z-index: 39; pointer-events: none;
            animation: hit-blast 0.4s ease-out forwards;
        }
        @keyframes hit-blast {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* 獨立浮現的判定文字 (出現在按下的音符旁) */
        .local-judgement {
            position: absolute;
            transform: translate(-50%, -100%);
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 100; pointer-events: none;
            animation: float-up 0.5s ease-out forwards;
        }
        @keyframes float-up {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            50% { transform: translate(-50%, -100%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
        }

        /* UI 層 */
        .glass-ui { background: rgba(10, 10, 10, 0.85); border: 1px solid #444; backdrop-filter: blur(10px); }
        .diff-btn { border: 1px solid #c0a080; padding: 6px 10px; font-size: 0.7rem; color: #c0a080; border-radius: 4px; transition: 0.3s; }
        .diff-btn.active { background: #c0a080; color: #1a120b; font-weight: 900; }
        .start-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <!-- 遊戲主舞台 -->
    <div id="play-area">
        <div id="scanline"></div>
    </div>

    <!-- UI 面板 -->
    <div class="absolute top-4 left-4 glass-ui p-4 rounded shadow-2xl z-50 pointer-events-none">
        <div class="flex items-center gap-3">
            <div>
                <div class="text-[10px] text-amber-500 tracking-[0.2em] font-bold">SCORE</div>
                <div id="score-display" class="text-3xl font-black text-white italic">000000</div>
            </div>
            <div class="border-l border-gray-600 pl-3">
                <div class="text-[10px] text-sky-400 tracking-[0.2em] font-bold">COMBO</div>
                <div id="combo-display" class="text-3xl font-black text-white">0</div>
            </div>
        </div>
    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black/95 p-8 text-center">
        <h2 class="text-amber-600 text-sm tracking-[0.8em] mb-2">CYTUS STYLE RHYTHM</h2>
        <h1 class="text-6xl font-black text-white italic border-b-4 border-amber-800 pb-2 mb-8">日輪之律</h1>

        <div class="glass-ui p-6 rounded-xl w-full max-w-sm shadow-2xl">
            <div class="mb-4 text-left">
                <p class="text-amber-100/60 text-[10px] mb-1 uppercase tracking-widest">Select Song</p>
                <select id="song-select" class="bg-black/50 border border-amber-900 text-white text-sm p-3 w-full rounded outline-none focus:border-amber-500"></select>
            </div>

            <div class="mb-6 text-left">
                <p class="text-amber-100/60 text-[10px] mb-1 uppercase tracking-widest">Difficulty</p>
                <div class="flex justify-between gap-2">
                    <button class="diff-btn active flex-1" onclick="setDiff('easy', this)">癸 (水)</button>
                    <button class="diff-btn flex-1" onclick="setDiff('normal', this)">乙 (雷)</button>
                    <button class="diff-btn flex-1" onclick="setDiff('hard', this)">柱 (炎)</button>
                </div>
            </div>

            <button id="start-btn" disabled class="w-full bg-slate-800 text-slate-500 font-black py-4 rounded-lg text-lg transition-all border-b-4 border-slate-900">
                連接音律網路中...
            </button>
            <p id="audio-info" class="text-amber-700 text-[9px] mt-4 font-bold tracking-tighter">WAITING...</p>
        </div>
    </div>

    <audio id="bgm-player" crossorigin="anonymous"></audio>

    <script>
        // --- 1. 曲目與設定 ---
        const SONGS = {
            gurenge: {
                title: "紅蓮華 (Piano Ver.)",
                url: "https://raw.githubusercontent.com/w8523147/demon-slayer-rhythm/main/bgm.mp3",
                bpm: 135,
                offset: 2200 
            }
        };

        const CONFIG = {
            easy: { color: '#00b4d8' },
            normal: { color: '#ffb703' },
            hard: { color: '#e63946' }
        };

        // 核心掃描線參數：決定一頁(由上到下)要花幾個「拍子」
        // Cytus 通常是 4 拍或 2 拍一頁
        const BEATS_PER_PAGE = 4; 

        let currentSongKey = "gurenge";
        let currentLevel = 'easy';
        let isPlaying = false;
        let score = 0, combo = 0, maxCombo = 0;
        let audioCtx;
        let gameChart = [];
        let pageDuration = 0; // 一頁掃描所需毫秒數

        const playArea = document.getElementById('play-area');
        const scanline = document.getElementById('scanline');
        const bgm = document.getElementById('bgm-player');
        const startBtn = document.getElementById('start-btn');
        const audioInfo = document.getElementById('audio-info');

        // --- 2. 初始化選單 ---
        const initUI = () => {
            const select = document.getElementById('song-select');
            select.innerHTML = Object.keys(SONGS).map(k => `<option value="${k}">${SONGS[k].title}</option>`).join('');
            select.onchange = (e) => { currentSongKey = e.target.value; loadMusic(); };
        };

        const loadMusic = () => {
            startBtn.disabled = true;
            startBtn.innerText = "讀取音源中...";
            startBtn.classList.replace('bg-amber-600', 'bg-slate-800');
            bgm.src = SONGS[currentSongKey].url;
            bgm.load();
            bgm.oncanplaythrough = () => {
                startBtn.disabled = false;
                startBtn.classList.replace('bg-slate-800', 'bg-amber-600');
                startBtn.classList.replace('text-slate-500', 'text-white');
                startBtn.classList.add('start-anim');
                startBtn.innerText = "LINK START";
                audioInfo.innerText = "READY TO PLAY";
            };
        };

        function setDiff(level, btn) {
            currentLevel = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.documentElement.style.setProperty('--water-blue', CONFIG[level].color);
        }

        // --- 3. 譜面引擎 (Cytus 邏輯) ---
        const generateCytusChart = (duration) => {
            const chart = [];
            const song = SONGS[currentSongKey];
            const beatInterval = (60 / song.bpm) * 1000;
            pageDuration = beatInterval * BEATS_PER_PAGE;
            
            // 生成音符
            for (let t = song.offset; t < (duration * 1000) - 3000; t += beatInterval) {
                // X 座標限制在 15% ~ 85% 之間避免超出螢幕
                const posX = 15 + Math.random() * 70;
                
                // 【核心魔法】計算音符的絕對 Y 座標
                // 根據時間 t 落在掃描線週期的哪裡，決定它在畫面上的 Y 軸位置
                const totalProgress = t / pageDuration;
                const pageCycle = Math.floor(totalProgress); // 第幾頁 (偶數向下，奇數向上)
                const pagePhase = totalProgress - pageCycle; // 0.0 ~ 1.0 的進度
                
                // 如果是偶數頁 (往下掃)，Y 是由小變大；如果是奇數頁 (往上掃)，Y 是由大變小
                const posY = (pageCycle % 2 === 0) ? pagePhase * 100 : (1 - pagePhase) * 100;

                chart.push({ 
                    time: t, 
                    x: posX, 
                    y: posY, 
                    spawned: false, 
                    hit: false,
                    element: null
                });

                // 隨機雙按
                if(Math.random() > 0.85) {
                    const posX2 = 15 + Math.random() * 70;
                    chart.push({ time: t, x: posX2, y: posY, spawned: false, hit: false, element: null });
                }
            }
            return chart;
        };

        // --- 4. 遊戲主循環 ---
        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('start-screen').style.display = 'none';
            // 清除之前的節點 (若有)
            document.querySelectorAll('.cytus-note').forEach(e => e.remove());
            score = 0; combo = 0; updateUI();

            gameChart = generateCytusChart(bgm.duration || 180);
            isPlaying = true;
            bgm.play();

            function frame() {
                if (!isPlaying) return;
                const currentTime = bgm.currentTime * 1000;

                // 1. 更新掃描線位置
                const totalProgress = currentTime / pageDuration;
                const pageCycle = Math.floor(totalProgress);
                const pagePhase = totalProgress - pageCycle;
                const currentLineY = (pageCycle % 2 === 0) ? pagePhase * 100 : (1 - pagePhase) * 100;
                scanline.style.top = `${currentLineY}%`;

                // 掃描線顏色隨著難度變化
                scanline.style.boxShadow = `0 0 20px 5px ${CONFIG[currentLevel].color}, 0 0 40px ${CONFIG[currentLevel].color}`;

                // 2. 音符生成與狀態管理
                gameChart.forEach(note => {
                    // 出現時機：提前 1 頁的時間出現在畫面上讓玩家準備
                    const spawnTime = note.time - pageDuration;

                    // 生成音符
                    if (!note.spawned && currentTime >= spawnTime && currentTime < note.time) {
                        spawnNote(note);
                    }

                    // 更新音符外環動畫 (Shrinking ring)
                    if (note.spawned && !note.hit && note.element) {
                        const ring = note.element.querySelector('.note-ring');
                        if(ring) {
                            // 計算距離擊打時間的比例，從 1.8 縮到 1.0
                            let timeLeft = note.time - currentTime;
                            let ringScale = 1.0 + (timeLeft / pageDuration) * 0.8;
                            ringScale = Math.max(1.0, Math.min(1.8, ringScale));
                            ring.style.transform = `scale(${ringScale})`;
                        }
                    }

                    // Miss 判定：時間超過目標時間 150 毫秒還沒打
                    if (note.spawned && !note.hit && currentTime > note.time + 150) {
                        note.hit = true;
                        combo = 0; 
                        updateUI();
                        showJudgement(note.x, note.y, "MISS", "#ff4444");
                        if(note.element) {
                            note.element.style.opacity = '0.3';
                            note.element.style.transform = `translate(-50%, -50%) scale(0.8)`;
                            setTimeout(() => note.element.remove(), 200);
                        }
                    }
                });

                if (bgm.ended) endGame();
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        // --- 5. 繪製與互動 ---
        function spawnNote(noteData) {
            const div = document.createElement('div');
            div.className = 'cytus-note';
            div.style.left = `${noteData.x}%`;
            div.style.top = `${noteData.y}%`;
            
            // 隨難度改變外環顏色
            div.innerHTML = `
                <div class="note-ring" style="border-color: ${CONFIG[currentLevel].color}"></div>
                <div class="note-inner"></div>
            `;
            
            playArea.appendChild(div);
            noteData.element = div;
            noteData.spawned = true;

            // 綁定點擊/觸控事件
            // 使用 pointerdown 可以同時支援滑鼠與觸控螢幕
            div.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                handleHit(noteData);
            });
        }

        function handleHit(noteData) {
            if (!isPlaying || noteData.hit) return;
            
            // 確保有聲音互動反饋
            initAudio(); 

            const currentTime = bgm.currentTime * 1000;
            // 計算誤差 (絕對值)
            const diff = Math.abs(currentTime - noteData.time);

            noteData.hit = true;
            
            let rating = "";
            let points = 0;
            let color = "";

            if (diff < 80) { // Perfect
                rating = "PERFECT"; points = 100; color = CONFIG[currentLevel].color;
            } else if (diff < 150) { // Great
                rating = "GREAT"; points = 50; color = "#ffffff";
            } else { // 點太早或太晚算 Miss
                combo = 0; updateUI(); showJudgement(noteData.x, noteData.y, "MISS", "#ff4444");
                noteData.element.remove();
                return;
            }

            // 加分與連擊
            score += points;
            combo++;
            if (combo > maxCombo) maxCombo = combo;
            updateUI();

            // 視覺特效：擊碎動畫與局部判定文字
            showJudgement(noteData.x, noteData.y, rating, color);
            createHitEffect(noteData.x, noteData.y, color);

            // 移除原本的音符
            noteData.element.remove();
        }

        function createHitEffect(x, y, color) {
            const effect = document.createElement('div');
            effect.className = 'note-hit-effect';
            effect.style.left = `${x}%`;
            effect.style.top = `${y}%`;
            effect.style.background = color;
            playArea.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
        }

        function showJudgement(x, y, txt, col) {
            const el = document.createElement('div');
            el.className = 'local-judgement';
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;
            el.style.color = col;
            el.innerText = txt;
            playArea.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(score).toString().padStart(6, '0');
            document.getElementById('combo-display').innerText = combo;
        }

        function endGame() {
            isPlaying = false;
            alert(`任務達成！\n總分：${score}\n最高連擊：${maxCombo}`);
            location.reload();
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        startBtn.onclick = startGame;
        initUI();
        loadMusic();

    </script>
</body>
</html>
